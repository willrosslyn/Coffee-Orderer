name: Weather Historical Sync

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2025-04-14'
      end_date:
        description: 'End date (YYYY-MM-DD) — leave blank for yesterday'
        required: false
        default: ''

jobs:
  historical-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run historical weather sync
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WEATHER_LAT:          ${{ secrets.WEATHER_LAT }}
          WEATHER_LON:          ${{ secrets.WEATHER_LON }}
          START_DATE:           ${{ inputs.start_date }}
          END_DATE:             ${{ inputs.end_date }}
        run: python weather_historical_sync.py
