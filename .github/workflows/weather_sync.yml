name: Weather Sync

on:
  schedule:
    # Every Monday at 05:00 UTC (before staff arrive)
    - cron: '0 5 * * 1'
  workflow_dispatch:
    # Also allow manual trigger from GitHub Actions tab

jobs:
  sync-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run weather sync
        env:
          VISUAL_CROSSING_KEY:  ${{ secrets.VISUAL_CROSSING_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WEATHER_LOCATION:     ${{ secrets.WEATHER_LOCATION }}
        run: python weather_sync.py
